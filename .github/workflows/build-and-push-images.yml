name: Build and Push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: build-and-push-images-${{ github.ref }}
  cancel-in-progress: true

env:
  K8S_NAMESPACE: voros-bence

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare image variables
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi

          # Repo owner (lowercased for Docker registry compatibility)
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Only build backend and frontend images
          SERVICES=("backend" "frontend")

          MATRIX_JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -cs .)

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "repo_owner=$REPO_OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCT_TOKEN }} 

      - name: Build, tag, and push images
        run: |
          SERVICE=${{ matrix.service }}
          TAG=${{ steps.vars.outputs.image_tag }}
          OWNER=${{ steps.vars.outputs.repo_owner }}
          
          # 1. Define build context based on the current matrix service FIRST
          if [ "$SERVICE" = "frontend" ]; then
            CONTEXT=./calculator
          else
            CONTEXT=./calculator_backend
          fi
          
          # 2. Set the registry to GHCR
          REGISTRY=ghcr.io/$OWNER
          
          # 3. Construct image names
          IMAGE=$REGISTRY/calculator-$SERVICE:$TAG
          IMAGE_LATEST=$REGISTRY/calculator-$SERVICE:latest
          
          # 4. Build and push (Now $CONTEXT has a value!)
          docker build -t $IMAGE -t $IMAGE_LATEST $CONTEXT
          docker push $IMAGE
          docker push $IMAGE_LATEST

  verify-pull-secret:
    name: Verify/Create GHCR imagePullSecret
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Install kubectl CLI
        uses: azure/setup-kubectl@v4

      - name: Decode KUBECONFIG
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.JEDLIK_K8S_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Prepare deploy variables
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "repo_owner=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Update k8s manifests with new image tag
        run: |
          OWNER="${{ steps.vars.outputs.repo_owner }}"
          TAG="${{ steps.vars.outputs.image_tag }}"

          # Update backend and frontend compose files.
          sed -i -E "s|(ghcr.io/${OWNER}/calculator-backend):[a-zA-Z0-9_.-]+|\1:${TAG}|g" calculator_backend/compose.yaml
          sed -i -E "s|(ghcr.io/${OWNER}/calculator-frontend):[a-zA-Z0-9_.-]+|\1:${TAG}|g" calculator/compose.yaml
      - name: Ensure/refresh ghcr-pull-secret
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ steps.vars.outputs.repo_owner }}" \
            --docker-password="${{ secrets.GHCT_TOKEN || github.token }}" \
            --docker-email=actions@github.com \
            --dry-run=client -o yaml | kubectl apply -n "$K8S_NAMESPACE" -f -

      - name: Commit and push manifest changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update k8s manifests to image tag ${{ steps.vars.outputs.image_tag }}"
          branch: ${{ github.ref_name }}
          file_pattern: "calculator_backend/compose.yaml calculator/compose.yaml"

      - name: Deploy to Kubernetes
        run: |
          set -euo pipefail
          export KUBECONFIG=$HOME/.kube/config

          kubectl apply -f k8s-backend.yaml
          kubectl apply -f k8s-frontend.yaml

          kubectl rollout status deployment/calculator-backend -n "$K8S_NAMESPACE" --timeout=300s &
          p1=$!
          kubectl rollout status deployment/calculator-frontend -n "$K8S_NAMESPACE" --timeout=300s &
          p2=$!

          wait $p1
          wait $p2
