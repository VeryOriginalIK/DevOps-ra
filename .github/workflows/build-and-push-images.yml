name: Docker Image CI & publis to K8S

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: genarate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV


    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |

        docker login ghcr.io -u VeryOriginalIk -p ${{ secrets.GHCR_TOKEN }}
        docker build ./calculator --file ./calculator/Dockerfile --tag ghcr.io/VeryOriginalIk/calculator:$IMAGE_TAG
        docker push ghcr.io/VeryOriginalIk/calculator:$IMAGE_TAG
        docker build ./calculator_backend --file ./calculator_backend/Dockerfile --tag ghcr.io/VeryOriginalIk/calculator-backend:$IMAGE_TAG
        docker push ghcr.io/VeryOriginalIk/calculator-backend:$IMAGE_TAG

        sed -i 's|image: ghcr.io/VeryOriginalIk/calculator:.*|image: ghcr.io/VeryOriginalIk/calculator:'"$IMAGE_TAG"'|' deployment.yaml
        sed -i 's|image: ghcr.io/VeryOriginalIk/calculator-backend:.*|image: ghcr.io/VeryOriginalIk/calculator-backend:'"$IMAGE_TAG"'|' deployment.yaml
        git config --global user.name "VeryOriginalIk"
        git config --global user.email "veryoriginalik@example.com"

        git add deployment.yaml
        git commit -m "update K8S image tag in deployment.yaml"
        git push

        mkdir -p ~/.kube
        echo "${{ secrets.JEDLIK_K8S_CONFIG }}" | base64 -d > ~/.kube/config
        kubectl apply -f ./deployment.yaml