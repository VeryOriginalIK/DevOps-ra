version: '3.8'
services:
  frontend:
    build:
      context: ./calculator
    environment:
      - REACT_APP_API_URL=http://calculator-backend.jcloud.jedlik.cloud:5001
    ports:
      - 3000:3000
    depends_on:
      - backend
  backend:
    build:
      context: ./calculator-backend
    ports:
      - 5001:5001
    environment:
      - NODE_ENV=production
