version: '3.8'
services:
  frontend:
    build:
      context: ./calculator
    environment:
      - REACT_APP_API_URL=http://localhost:5001/api/calculate
    ports:
      - 3000:3000
    depends_on:
      - backend
  backend:
    build:
      context: ./calculator_backend
    ports:
      - 5001:5001
    environment:
      - NODE_ENV=production
